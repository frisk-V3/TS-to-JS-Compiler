<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TS Compiler</title>
    <!-- 1. まずライブラリを読み込む -->
    <script src="https://cdnjs.cloudflare.com"></script>
</head>
<body>
    <div id="root"></div>

    <script>
        // ライブラリ(ts)が読み込まれているかチェック
        if (typeof ts === 'undefined') {
            document.body.innerHTML = '<h1 style="color:red;">Error: TypeScript library not loaded!</h1>';
        }

        // 画面レイアウト作成
        document.getElementById('root').innerHTML = `
            <div style="padding: 20px; font-family: sans-serif;">
                <h2>TS to JS Compiler</h2>
                <textarea id="input" style="width: 100%; height: 150px; font-family: monospace;" 
                    placeholder="例: let x: number = 10;"></textarea>
                <button id="compileBtn" style="margin: 10px 0; padding: 10px 20px;">Compile!</button>
                <h3>Result:</h3>
                <pre id="output" style="background: #eee; padding: 10px;"></pre>
            </div>
        `;

        const input = document.getElementById("input");
        const btn = document.getElementById("compileBtn");
        const output = document.getElementById("output");

        btn.onclick = () => {
            try {
                // ts.transpileModule を使って安全に変換
                const result = ts.transpileModule(input.value, {
                    compilerOptions: { 
                        target: ts.ScriptTarget.ESNext,
                        module: ts.ModuleKind.None 
                    }
                });
                output.innerText = result.outputText;
            } catch (e) {
                output.innerText = "Compile Error: " + e.message;
            }
        };
    </script>
</body>
</html>
