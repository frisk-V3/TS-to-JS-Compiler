<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TypeScript Converter (Fixed)</title>
    <!-- 安定している unpkg の CDN -->
    <script src="https://unpkg.com/typescript@latest/lib/typescript.js"></script>
    <!-- CSSの読み込み -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>TS to JS 変換器</h1>
    <div id="status">準備中... (TypeScriptライブラリを読み込んでいます)</div>

    <div class="container">
        <div class="box">
            <h2>TypeScript (入力)</h2>
            <textarea id="tsInput">
const hello = (name: string): string => {
  return `Hello, ${name}!`;
};</textarea>
        </div>
        <div class="box">
            <h2>JavaScript (出力)</h2>
            <textarea id="jsOutput" readonly></textarea>
        </div>
    </div>

    <!-- JSの読み込み -->
    <script src="script.js"></script>
</body>
</html>
