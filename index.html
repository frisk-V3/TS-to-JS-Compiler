<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TS Compiler</title>
    <!-- 1. ライブラリを先に読み込む -->
    <script src="https://cdnjs.cloudflare.com"></script>
</head>
<body>
    <div id="root">
        <div style="padding: 20px; font-family: sans-serif;">
            <h2>TS to JS Compiler</h2>
            <textarea id="input" style="width: 100%; height: 150px; font-family: monospace;" 
                placeholder="let x: number = 10;"></textarea>
            <button id="compileBtn" style="margin: 10px 0; padding: 10px 20px;">Compile!</button>
            <h3>Result:</h3>
            <pre id="output" style="background: #eee; padding: 10px;"></pre>
        </div>
    </div>

    <script>
        // 2. ページとライブラリの読み込みが「完全に終わってから」実行する
        window.onload = () => {
            const input = document.getElementById("input");
            const btn = document.getElementById("compileBtn");
            const output = document.getElementById("output");

            // ライブラリが正しく読み込めたか最終確認
            if (typeof ts === 'undefined') {
                output.innerText = "Error: TypeScript library still not loaded.";
                return;
            }

            btn.onclick = () => {
                try {
                    const result = ts.transpileModule(input.value, {
                        compilerOptions: { 
                            target: ts.ScriptTarget.ESNext,
                            module: ts.ModuleKind.None 
                        }
                    });
                    output.innerText = result.outputText;
                } catch (e) {
                    output.innerText = "Compile Error: " + e.message;
                }
            };
        };
    </script>
</body>
</html>
