<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TS to JS Compiler</title>
    <!-- 1. TypeScript公式のコンパイラライブラリを読み込む -->
    <script src="https://cdnjs.cloudflare.com"></script>
</head>
<body>
    <div style="padding: 20px; font-family: sans-serif;">
        <h2>TS to JS Compiler</h2>
        <textarea id="input" style="width: 100%; height: 150px; font-family: monospace;" 
            placeholder="let x: number = 10;"></textarea>
        
        <button id="compileBtn" style="margin: 10px 0; padding: 10px 20px; cursor: pointer;">
            JSに変換
        </button>

        <h3>出力結果:</h3>
        <pre id="output" style="background: #f0f0f0; padding: 10px; min-height: 50px; border-radius: 4px;"></pre>
    </div>

    <script>
        const input = document.getElementById("input");
        const btn = document.getElementById("compileBtn");
        const output = document.getElementById("output");

        btn.onclick = () => {
            const tsCode = input.value;
            try {
                // 2. ts.transpileModule を使って本物のコンパイルを実行
                // 第2引数で出力形式（ESNext, CommonJSなど）を指定可能
                const result = ts.transpileModule(tsCode, {
                    compilerOptions: { 
                        module: ts.ModuleKind.CommonJS,
                        target: ts.ScriptTarget.ESNext 
                    }
                });
                output.innerText = result.outputText;
            } catch (e) {
                output.innerText = "Error: " + e.message;
            }
        };
    </script>
</body>
</html>
